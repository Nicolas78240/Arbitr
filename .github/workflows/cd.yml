name: CD

on:
  push:
    branches: [main]

env:
  PROJECT_ID: arbitr-prod
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/arbitr-prod/arbitr
  API_SERVICE: arbitr-api
  WEB_SERVICE: arbitr-web

jobs:
  deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ env.REGISTRY }}/api:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build API image
        run: |
          docker build \
            --no-cache \
            -f docker/Dockerfile.api \
            -t ${{ env.IMAGE_TAG }} \
            .

      - name: Push API image
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image=${{ env.IMAGE_TAG }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --quiet

  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api   # web depends on API being up
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ env.REGISTRY }}/web:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build Web image
        run: |
          docker build \
            --no-cache \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -f docker/Dockerfile.web \
            -t ${{ env.IMAGE_TAG }} \
            .

      - name: Push Web image
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image=${{ env.IMAGE_TAG }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --quiet
